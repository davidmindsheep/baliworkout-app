server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache the hashed Vite assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — let client-side routing (react-router) handle deep links
    location / {
        try_files $uri $uri/ /index.html;
    }
}
